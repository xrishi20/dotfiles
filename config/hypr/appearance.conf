monitor = HDMI-A-1, 2560x1440@144, 0x0, 1
monitor = eDP-1, 1920x1200@60, 2560x0, 1.25

workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1

# Theming
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = gsettings set org.gnome.desktop.interface font-antialiasing rgba
exec-once = gsettings set org.gnome.desktop.interface font-hinting slight
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Colloid'
exec-once = gsettings set org.gnome.desktop.wm.preferences theme 'Colloid'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus'
exec-once = gsettings set org.gnome.desktop.interface font-name 'Inter'
exec-once = gsettings set org.gnome.desktop.interface monospace-font-name 'JetBrainsMono NF'
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Qogir-white-cursors'
exec-once = hyprctl setcursor Qogir-white-cursors 24

general {
   gaps_in = 2
   gaps_out = 8
   border_size = 2
   layout = dwindle
   col.active_border = rgb(33ccff)
   col.inactive_border = rgba(ffffff40)
}

decoration {
   rounding = 10
   rounding_power = 2
   active_opacity = 1
   inactive_opacity = 1
   fullscreen_opacity = 1

   shadow {
      enabled = false
   }

   blur {
      enabled = true
      size = 4
      passes = 4
   }
}

animations {
   enabled = yes, please :)

   #        NAME,           X0,   Y0,   X1,   Y1
   bezier = easeOutQuint,   0.23, 1,    0.32, 1
   bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
   bezier = linear,         0,    0,    1,    1
   bezier = almostLinear,   0.5,  0.5,  0.75, 1
   bezier = quick,          0.15, 0,    0.1,  1

   #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
   animation = global,        1,     10,    default
   animation = border,        1,     5.39,  easeOutQuint
   animation = windows,       1,     4.79,  easeOutQuint
   animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
   animation = windowsOut,    1,     1.49,  linear,       popin 87%
   animation = fadeIn,        1,     1.73,  almostLinear
   animation = fadeOut,       1,     1.46,  almostLinear
   animation = fade,          1,     3.03,  quick
   animation = layers,        1,     3.81,  easeOutQuint
   animation = layersIn,      1,     4,     easeOutQuint, fade
   animation = layersOut,     1,     1.5,   linear,       fade
   animation = fadeLayersIn,  1,     1.79,  almostLinear
   animation = fadeLayersOut, 1,     1.39,  almostLinear
   animation = workspaces,    1,     1.94,  almostLinear, fade
   animation = workspacesIn,  1,     1.21,  almostLinear, fade
   animation = workspacesOut, 1,     1.94,  almostLinear, fade
   animation = zoomFactor,    1,     7,     quick
}


misc {
   force_default_wallpaper = 0
   disable_hyprland_logo = true
   disable_splash_rendering = true
}
